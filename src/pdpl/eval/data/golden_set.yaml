# PDPL Autopilot — AI gap-explanation golden set (ADR-0010 §4)
#
# Version-controlled eval corpus. Each case is a real, tenant-agnostic
# GapContext (ADR-0009 §2) reusing the seeded controls (migration 0003) as the
# input corpus. The `rationale` of every case is PROVABLY FAITHFUL engine
# output: `source_answers` regenerate it through the real deterministic engine
# (pdpl.services.decision), and tests/test_eval_golden_set.py asserts the match
# — so these strings cannot drift into hand-typed lookalikes.
#
# Distribution (weighted hybrid, ADR-0010 §4): heavy on the four governed
# controls (privacy-notice / dsr-access / breach-72h / ropa) across
# non_compliant / partial / not_assessed — where the rationale is rich and
# real — plus high-severity not_assessed cases (security ART19, lawful-basis
# ART5, cross-border ART29) whose behavioural value (does the model bind to the
# control TITLE when the rationale is thin?) is exercised in C3, not the stub.
#
# Two layers kept apart (ADR-0010 §2):
#   input   -> the GapContext (machine-generated, faithful).
#   expect / quality_*  -> THE HUMAN LAYER. must_contain / must_not_contain are
#       per-case Layer-A assertions; quality_score is the Layer-B human rating.
#       BOTH are scored in C3 against the real model, NOT against the stub.
#       They are intentionally EMPTY here for the engineer (Faisal) to fill:
#         - must_contain:     substrings the explanation MUST include (e.g. the
#                             specific gap, a sensible remediation step).
#         - must_not_contain: substrings it MUST NOT include (e.g. any
#                             compliance assertion, an out-of-scope claim).
#         - quality_criteria: a one-line note of what "good" means for THIS gap
#                             (right gap explained, sensible fix, clear Arabic).
#         - quality_score:    leave null; rated 1-5 once in C3, never off a stub.

