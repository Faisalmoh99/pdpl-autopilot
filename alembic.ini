# Alembic configuration for PDPL Autopilot.
#
# The sqlalchemy.url is intentionally blank: env.py reads DATABASE_URL_DIRECT
# from the environment (loaded from .env via python-dotenv). Per ADR-0001,
# Alembic uses the *direct* Supabase connection (port 5432); the Supabase
# pooler cannot run DDL.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
